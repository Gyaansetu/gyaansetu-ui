name: Deploy Gyaansetu Frontend to Production

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/gyaansetu/gyaansetu-frontend:prod

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/gyaansetu

            docker pull ghcr.io/gyaansetu/gyaansetu-frontend:prod

            docker stop gyaansetu-frontend || true
            docker rm gyaansetu-frontend || true

            docker run -d \
              --name gyaansetu-frontend \
              --restart unless-stopped \
              --network gyaansetu-network \
              ghcr.io/gyaansetu/gyaansetu-frontend:prod

            docker image prune -af --filter "until=24h"

            echo "Frontend deployed successfully"